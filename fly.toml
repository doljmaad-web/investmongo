app = "invest-mongo-bot"
primary_region = "nrt"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[mounts]
  source = "invest_mongo_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]
