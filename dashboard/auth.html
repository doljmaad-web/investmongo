<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — DeFiMongo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #050810;
      --surface:  #0d1117;
      --surface2: #161b27;
      --border:   rgba(255,255,255,0.08);
      --blue:     #4f6ef7;
      --blue-dim: rgba(79,110,247,0.15);
      --green:    #4ade80;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Radial glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(79,110,247,0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 40% at 80% 80%, rgba(74,222,128,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(79,110,247,0.08);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--blue), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .heading {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      color: #fff;
    }

    .subheading {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 36px;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: background 0.18s, border-color 0.18s, transform 0.12s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #3d5ce6;
      border-color: #3d5ce6;
    }

    .btn-metamask {
      border-color: rgba(245,149,14,0.3);
    }

    .btn-metamask:hover:not(:disabled) {
      border-color: rgba(245,149,14,0.5);
      background: rgba(245,149,14,0.08);
    }

    .btn-github {
      border-color: rgba(255,255,255,0.15);
    }

    .btn-github:hover:not(:disabled) {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.06);
    }

    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn.loading .btn-spinner { display: block; }
    .btn.loading .btn-label   { opacity: 0; position: absolute; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .footer-text {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 28px;
      line-height: 1.6;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .alert-error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.25);
      color: var(--green);
    }

    .alert.visible { display: block; }

    /* Icon SVGs */
    svg { flex-shrink: 0; }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      .heading { font-size: 20px; }
    }
  </style>
</head>
<body>

    <p class="footer-text">
      New here? Your account is created automatically on first sign in.

  <script>
    // ── Helpers ──────────────────────────────────────────────

    function showError(msg) {
      const el = document.getElementById('alertError');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('alertSuccess').classList.remove('visible');
    }

    function showSuccess(msg) {
      const el = document.getElementById('alertSuccess');
      el.textContent = msg;
      el.classList.add('visible');
      document.getElementById('alertError').classList.remove('visible');
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.classList.add('loading');
        btn.disabled = true;
      } else {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function saveAuth(token, user) {
      localStorage.setItem('dm_token', token);
      localStorage.setItem('dm_user',  JSON.stringify(user));
    }

    const NEXT_DESTINATIONS = {
      aat:     '/',
      scanner: 'https://erikwonlife-glitch.github.io/DeFiMongo/',
    };

    function getNextDestination(user) {
      const next = new URLSearchParams(window.location.search).get('next')
                || sessionStorage.getItem('dm_next');
      sessionStorage.removeItem('dm_next');
      if (next && NEXT_DESTINATIONS[next]) return NEXT_DESTINATIONS[next];
      if (user.is_admin) return '/admin';
      return '/portfolio';
    }

    function redirectAfterLogin(user) {
      window.location.href = getNextDestination(user);
    }

    // ── Google OAuth ──────────────────────────────────────────

    async function loginGoogle() {
      setLoading('btnGoogle', true);
      const next = new URLSearchParams(window.location.search).get('next');
      if (next) sessionStorage.setItem('dm_next', next);
      try {
        const redirectUri = window.location.origin + '/auth';
        const res  = await fetch(`/api/auth/google/url?redirect_uri=${encodeURIComponent(redirectUri)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        window.location.href = data.url;
      } catch (e) {
        showError('Google sign-in failed: ' + e.message);
        setLoading('btnGoogle', false);
      }
    }

    // ── GitHub OAuth ──────────────────────────────────────────

    async function loginGithub() {
      setLoading('btnGitHub', true);
      const next = new URLSearchParams(window.location.search).get('next');
      if (next) sessionStorage.setItem('dm_next', next);
      try {
        const redirectUri = window.location.origin + '/auth';
        const res  = await fetch(`/api/auth/github/url?redirect_uri=${encodeURIComponent(redirectUri)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        window.location.href = data.url;
      } catch (e) {
        showError('GitHub sign-in failed: ' + e.message);
        setLoading('btnGitHub', false);
      }
    }

    // ── OAuth callback handler ────────────────────────────────

    async function handleOAuthCallback() {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const state  = params.get('state');
      if (!code) return;

      const redirectUri = window.location.origin + '/auth';

      // Clean URL immediately
      window.history.replaceState({}, '', '/auth');

      if (state === 'github') {
        // GitHub callback
        setLoading('btnGitHub', true);
        try {
          const res  = await fetch(`/api/auth/github/callback?code=${encodeURIComponent(code)}&redirect_uri=${encodeURIComponent(redirectUri)}`);
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          saveAuth(data.token, data.user);
          showSuccess('Signed in! Redirecting...');
          setTimeout(() => redirectAfterLogin(data.user), 800);
        } catch (e) {
          showError('GitHub sign-in failed: ' + e.message);
          setLoading('btnGitHub', false);
        }
      } else {
        // Google callback
        setLoading('btnGoogle', true);
        try {
          const res  = await fetch(`/api/auth/google/callback?code=${encodeURIComponent(code)}&redirect_uri=${encodeURIComponent(redirectUri)}`);
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          saveAuth(data.token, data.user);
          showSuccess('Signed in! Redirecting...');
          setTimeout(() => redirectAfterLogin(data.user), 800);
        } catch (e) {
          showError('Google sign-in failed: ' + e.message);
          setLoading('btnGoogle', false);
        }
      }
    }

    // ── MetaMask ──────────────────────────────────────────────

    async function loginMetaMask() {
      if (!window.ethereum) {
        showError('MetaMask is not installed. Please install it from metamask.io');
        return;
      }

      setLoading('btnMetaMask', true);
      try {
        // Request accounts
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const address  = accounts[0];
        if (!address) throw new Error('No account selected');

        // Get nonce
        const nonceRes  = await fetch('/api/auth/metamask/nonce', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ address }),
        });
        const nonceData = await nonceRes.json();
        if (nonceData.error) throw new Error(nonceData.error);

        const nonce = nonceData.nonce;

        // Sign message using personal_sign
        const signature = await window.ethereum.request({
          method: 'personal_sign',
          params: [nonce, address],
        });

        // Verify signature
        const verifyRes  = await fetch('/api/auth/metamask/verify', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ address, signature, nonce }),
        });
        const verifyData = await verifyRes.json();
        if (verifyData.error) throw new Error(verifyData.error);

        saveAuth(verifyData.token, verifyData.user);
        showSuccess('Wallet connected! Redirecting...');
        setTimeout(() => redirectAfterLogin(verifyData.user), 800);

      } catch (e) {
        if (e.code === 4001) {
          showError('Signature request was cancelled.');
        } else {
          showError('MetaMask sign-in failed: ' + (e.message || 'Unknown error'));
        }
        setLoading('btnMetaMask', false);
      }
    }

    // ── Init ──────────────────────────────────────────────────

    // If already logged in, redirect
    const existingToken = localStorage.getItem('dm_token');
    const existingUser  = localStorage.getItem('dm_user');
    if (existingToken && existingUser) {
      try {
        const user = JSON.parse(existingUser);
        // Verify token is still valid
        fetch('/api/auth/me', { headers: { Authorization: `Bearer ${existingToken}` } })
          .then(r => r.json())
          .then(data => {
            if (data.user) redirectAfterLogin(data.user);
          })
          .catch(() => {});
      } catch {}
    }

    // Handle OAuth callback on page load
    handleOAuthCallback();
  </script>
</body>
</html>
