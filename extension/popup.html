<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width:260px; padding:16px; background:#080b0f; color:#e2e8f0;
           font-family:monospace; font-size:12px; }
    .logo { color:#f59e0b; font-weight:bold; font-size:14px; margin-bottom:12px; }
    .status { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .dot { width:8px; height:8px; border-radius:50%; background:#4ade80;
           animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .info { color:#64748b; font-size:11px; line-height:1.6; margin-bottom:12px; }
    .section { border-top:1px solid #1e293b; padding-top:10px; }
    label { display:block; color:#94a3b8; margin-bottom:4px; font-size:11px; }
    input { width:100%; box-sizing:border-box; background:#0f172a; border:1px solid #334155;
            color:#e2e8f0; padding:5px 8px; border-radius:4px; font-family:monospace; font-size:11px; }
    input:focus { outline:none; border-color:#f59e0b; }
    button { margin-top:8px; width:100%; background:#f59e0b; color:#000; border:none;
             padding:6px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px; }
    button:hover { background:#fbbf24; }
    .saved { color:#4ade80; font-size:11px; margin-top:4px; display:none; }
    a { color:#38bdf8; text-decoration:none; display:block; margin-top:10px; font-size:11px; }
    a:hover { color:#7dd3fc; }
  </style>
</head>
<body>
  <div class="logo">INVEST MONGO</div>
  <div class="status">
    <div class="dot"></div>
    <span>Watching TradingView</span>
  </div>
  <div class="info">
    Precision v9 signal detector active.<br>
    Yellow dots &rarr; BUY &nbsp;|&nbsp; Pink dots &rarr; SELL
  </div>
  <div class="section">
    <label for="botUrl">Bot Server URL</label>
    <input type="text" id="botUrl" placeholder="https://your-app.up.railway.app">
    <button id="saveBtn">Save</button>
    <div class="saved" id="savedMsg">&#10003; Saved</div>
  </div>
  <a id="dashLink" href="#" target="_blank" style="display:none">Open Dashboard &rarr;</a>
  <script src="popup.js"></script>
</body>
</html>
