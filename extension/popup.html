<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width:220px; padding:16px; background:#080b0f; color:#e2e8f0;
           font-family:monospace; font-size:12px; }
    .logo { color:#f59e0b; font-weight:bold; font-size:14px; margin-bottom:12px; }
    .status { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .dot { width:8px; height:8px; border-radius:50%; background:#4ade80;
           animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .info { color:#64748b; font-size:11px; line-height:1.6; }
    a { color:#38bdf8; text-decoration:none; display:block; margin-top:8px; }
  </style>
</head>
<body>
  <div class="logo">INVEST MONGO</div>
  <div class="status">
    <div class="dot"></div>
    <span>Watching TradingView</span>
  </div>
  <div class="info">
    Precision v9 signal detector active.<br>
    Yellow dots → BUY signal sent to bot.<br>
    Pink dots → SELL signal sent to bot.
  </div>
  <a href="https://your-app.fly.dev" target="_blank">Open Dashboard</a>
</body>
</html>
